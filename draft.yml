models:
  User:
    name: string
    surname: string
    patronymic: string
    password: string
    email: string:unique
    email_verified_at: nullable timestamp
    phone: string:unique
    gender: string:1
    birthdate: date

  Student:
    code: string
    user_id: id
    group_id: id

  Teacher:
    user_id: id
    relationships:
      belongsToMany: Subject

  Specialty:
    name: string:unique
    code: string:unique

  Group:
    code: string:unique
    semester: number
    specialty_id: id
    teacher_id: id

  Classroom:
    name: string:unique
    number: number:unique

  LessonType:
    short_name: string:unique
    name: string:unique

  AttendanceOption:
    short_name: string:unique
    name: string:unique

  Subject:
    name: string:unique
    relationships:
      belongsToMany: Teacher

  Lesson:
    topic: string
    timestamp: timestamp
    teacher_id: id
    group_id: id
    subject_id: id
    classroom_id: id
    lesson_type_id: id

  Attendance:
    mark: number
    attendance_option_id: id
    student_id: id
    lesson_id: id

