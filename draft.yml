models:
  User:
    name: string
    surname: string
    patronymic: string
    password: string
    email: string unique
    email_verified_at: nullable timestamp
    phone: string unique
    gender: enum:М,Ж
    birthdate: date
    role_id: id foreign

  Role:
    name: string

  Student:
    code: string
    user_id: id foreign
    group_id: id foreign

  Teacher:
    user_id: id foreign
    relationships:
      belongsToMany: Subject

  Specialty:
    name: string unique
    code: string unique

  Group:
    code: string unique
    semester: number
    specialty_id: id foreign
    teacher_id: id foreign

  Classroom:
    name: string unique
    number: number:unique

  LessonType:
    short_name: string unique
    name: string unique

  AttendanceOption:
    short_name: string unique
    name: string unique

  Subject:
    name: string unique
    relationships:
      belongsToMany: Teacher

  Lesson:
    topic: string
    timestamp: timestamp
    teacher_id: id foreign
    group_id: id foreign
    subject_id: id foreign
    classroom_id: id foreign
    lesson_type_id: id foreign

  Attendance:
    mark: number
    attendance_option_id: id foreign
    student_id: id foreign
    lesson_id: id foreign

  InviteCodes:
    code: string
    user_id: id foreign
